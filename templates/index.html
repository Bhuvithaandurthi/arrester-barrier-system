<!DOCTYPE html>
<html>
<head>
    <title>AeroGuard AAS | RGUKT Basar</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-[#050505] text-gray-200 p-6 font-sans">
    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white">AeroGuard <span class="text-blue-500">v2.0</span></h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-gray-500">Aviation Safety & Telemetry Monitor</p>
            </div>
            <div id="status-box" class="px-6 py-2 rounded-lg font-bold text-xs bg-green-900/30 text-green-500 border border-green-500/50">SYSTEM NOMINAL</div>
        </div>

        <div class="grid grid-cols-12 gap-6">
            <!-- LEFT: FEED -->
            <div class="col-span-8 glass rounded-2xl overflow-hidden shadow-2xl relative">
                <img src="{{ url_for('video_feed') }}" class="w-full h-full object-cover">
            </div>

            <!-- RIGHT: CONTROLS & GRAPH -->
            <div class="col-span-4 flex flex-col gap-6">
                <!-- TELEMETRY CARD -->
                <div class="glass p-6 rounded-2xl">
                    <h3 class="text-gray-500 text-[10px] uppercase mb-4">Real-Time Metrics</h3>
                    <div class="flex items-baseline gap-2">
                        <span id="height-val" class="text-7xl font-black italic tracking-tighter text-white">4.80</span>
                        <span class="text-xl text-gray-600 font-light">meters</span>
                    </div>
                </div>

                <!-- GRAPH CARD -->
                <div class="glass p-4 rounded-2xl flex-grow h-64">
                    <canvas id="telemetryChart"></canvas>
                </div>

                <!-- CONTROLS -->
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="toggle('fog')" class="p-4 rounded-xl glass hover:bg-gray-800 transition text-xs font-bold">Simulate Fog</button>
                    <button onclick="toggle('enhance')" class="p-4 rounded-xl bg-blue-600 hover:bg-blue-700 transition text-xs font-bold text-white">AI De-Haze</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('telemetryChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(30).fill(''), datasets: [{ data: [], borderColor: '#3b82f6', borderWidth: 3, tension: 0.4, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 3.5, max: 5.5, grid: { display: false } }, x: { display: false } }, plugins: { legend: { display: false } } }
        });

        async function toggle(feat) {
            await fetch('/toggle', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({feature: feat}) });
        }

        async function refresh() {
            const res = await fetch('/status');
            const data = await res.json();
            document.getElementById('height-val').innerText = data.height_m.toFixed(2);
            chart.data.datasets[0].data = data.history;
            chart.update('none');
            
            const box = document.getElementById('status-box');
            if(data.status === "CRITICAL") {
                box.className = "px-6 py-2 rounded-lg font-bold text-xs bg-red-900/30 text-red-500 border border-red-500/50";
                box.innerText = "ALARM: SAFETY BREACH";
            } else {
                box.className = "px-6 py-2 rounded-lg font-bold text-xs bg-green-900/30 text-green-500 border border-green-500/50";
                box.innerText = "SYSTEM NOMINAL";
            }
        }
        setInterval(refresh, 100);
    </script>
</body>
</html>
